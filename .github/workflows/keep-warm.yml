name: keep-warm

# Prevent the Render free-tier backend from cold-starting (~50s) by pinging it
# every 10 minutes — under Render's ~15-minute idle spin-down window. Runs on
# GitHub's infrastructure, so no laptop needs to be on.
#
# Notes / limits (honest):
# - GitHub can delay scheduled runs by a few minutes under load; 10-min cadence
#   leaves margin under the 15-min sleep.
# - GitHub auto-disables scheduled workflows after 60 days with no repo activity.
# - Keeping one free service always awake uses ~730 of Render's 750 free
#   instance-hours/month — fine for a single service, not two.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend to keep it warm
        run: |
          URL="https://graded-memory-api.onrender.com/api/llm/status"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend warm"
              exit 0
            fi
            sleep 15
          done
          echo "backend did not return 200 after 3 attempts"
          exit 1
