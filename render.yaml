# Render blueprint — FastAPI backend on the free web-service tier (no card).
# Connect this repo in the Render dashboard; it reads this file.
# The frontend is hosted separately on Firebase and calls this service via VITE_API_BASE.
services:
  - type: web
    name: graded-memory-api
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: "pip install . && python scripts/seed_offline.py"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Bring-your-own-key: no server-side key, so the deploy defaults to deterministic
      # offline grading and burns no quota. A visitor can enable live agentic grading
      # from the UI with their own OpenAI-compatible provider (sent per-request, never
      # stored). Do NOT set GM_OFFLINE=1 here — that would hard-disable those per-request
      # keys. To make the whole deploy live, set LLM_BASE_URL / LLM_API_KEY / LLM_MODEL.
      - key: PYTHON_VERSION
        value: "3.11.9"
